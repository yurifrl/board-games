{{ range . }}
  <article class="card">
    <a href="/games/{{ .ID }}">
      <img src="/image/{{ .ID }}?source=auto&format=thumb" alt="{{ .Name }}" loading="lazy" style="width:100%;height:auto;border-radius:6px;">
    </a>
    <h3 class="title"><a href="/games/{{ .ID }}">{{ .Name }}</a></h3>
    <p>
      {{ if .URLBGG }}<a href="{{ .URLBGG }}" target="_blank" rel="noopener">BGG</a>{{ end }}
      {{ if and .URLBGG .URLLudopedia }} · {{ end }}
      {{ if .URLLudopedia }}<a href="{{ .URLLudopedia }}" target="_blank" rel="noopener">Ludopedia</a>{{ end }}
    </p>
  </article>
{{ end }}
