# ── board-games chart values ───────────────────────────────────────────────────────────
# The app image is PUBLIC (code only). Everything private comes at runtime.
# All state lives on a single volume (DATA_DIR): catalog.json, users.json,
# covers/, tmp-users.jsonl. The worker sidecar syncs catalog + users + covers
# from the Obsidian Local REST API; the app reads from the volume only.

image:
  repository: ghcr.io/OWNER/board-games
  tag: latest
  pullPolicy: Always

# Public hostnames for the catalog site.
hosts:
  - bg.example.com
baseUrl: https://bg.example.com
whatsappNumber: ""            # optional; or set via secret WHATSAPP_NUMBER

service:
  port: 8080

# ── worker sidecar: syncs from the Obsidian Local REST API ───────────────────
worker:
  intervalSeconds: 300
  # Vault folder + note the worker reads.
  inventoryFolder: Yuri/Resources/Board Games/Inventory
  usersNote: Yuri/Resources/Board Games/Users.md

# ── persistence: single volume for all state ─────────────────────────────────
cache:
  storageClass: longhorn
  size: 1Gi

# ── secrets the USER MUST PROVIDE ────────────────────────────────────────────
# Secret holding: OBSIDIAN_API_KEY, AUTH_SECRET, (opt) WHATSAPP_NUMBER,
# (opt) LUDOPEDIA_ACCESS_TOKEN / LUDOPEDIA_COOKIE for cover fetches.
# Provide via 1Password/ExternalSecret named `secretName`.
secretName: board-games

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }
