{{- $w := .Values.worker -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "board-games.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "board-games.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "board-games.fullname" . }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Worker: polls the Obsidian Local REST API, writes catalog + users +
        # covers into the shared volume. The app never talks to Obsidian.
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["bun", "run", "src/worker/index.ts"]
          env:
            - name: DATA_DIR
              value: /data
            - name: SYNC_INTERVAL_MS
              value: {{ (mul $w.intervalSeconds 1000) | quote }}
            - name: OBSIDIAN_API_URL
              value: {{ .Values.obsidianApiUrl | default "https://obsidian.default.svc:27124" | quote }}
            - name: OBSIDIAN_INVENTORY_FOLDER
              value: {{ $w.inventoryFolder | quote }}
            - name: OBSIDIAN_USERS_NOTE
              value: {{ $w.usersNote | quote }}
            - name: OBSIDIAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: OBSIDIAN_API_KEY
            - name: LUDOPEDIA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LUDOPEDIA_ACCESS_TOKEN
                  optional: true
            - name: LUDOPEDIA_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LUDOPEDIA_COOKIE
                  optional: true
            {{- if .Values.assetsGcsBucket }}
            - name: ASSETS_GCS_BUCKET
              value: {{ .Values.assetsGcsBucket | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/key.json
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.assetsGcsBucket }}
            - name: gcs-creds
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
        # The public catalog app. Reads the volume; also writes the /assets
        # variant cache, so the mount is writable.
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATA_DIR
              value: /data
            - name: BASE_URL
              value: {{ .Values.baseUrl | quote }}
            - name: WHATSAPP_NUMBER
              value: {{ .Values.whatsappNumber | quote }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: AUTH_SECRET
            {{- if .Values.assetsGcsBucket }}
            - name: ASSETS_GCS_BUCKET
              value: {{ .Values.assetsGcsBucket | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/key.json
            - name: ASSETS_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: AUTH_SECRET
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.assetsGcsBucket }}
            - name: gcs-creds
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "board-games.fullname" . }}-data
        {{- if .Values.assetsGcsBucket }}
        - name: gcs-creds
          secret:
            secretName: {{ .Values.gcsSecretName }}
            items:
              - key: private_key
                path: key.json
        {{- end }}
