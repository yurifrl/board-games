version: "3"

tasks:
  envs:op:
    desc: Resolve .env.op via 1Password CLI into .env
    generates:
      - .env
    cmds:
      - op inject -f --account my.1password.com -i .env.op -o .env

  sync:
    desc: "Worker one-shot: sync catalog + users + covers from Obsidian into the volume"
    deps: [envs:op]
    dotenv: ['.env']
    cmds:
      - SYNC_ONCE=1 bun run src/worker/index.ts

  worker:
    desc: "Worker sidecar: poll Obsidian and keep the volume in sync"
    deps: [envs:op]
    dotenv: ['.env']
    cmds:
      - bun run src/worker/index.ts
